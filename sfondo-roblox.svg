<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#003a55"/>
      <stop offset="50%" stop-color="#001f2e"/>
      <stop offset="100%" stop-color="#000d16"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4d96ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4d96ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1200" fill="url(#bg)"/>
  <!-- Glows -->
  <circle cx="200" cy="250" r="220" fill="url(#glow1)"/>
  <circle cx="600" cy="700" r="250" fill="url(#glow2)"/>
  <circle cx="400" cy="1000" r="200" fill="url(#glow1)"/>
  <!-- Roblox-style blocky characters / elements -->
  <!-- Character 1 - Noob (yellow head, blue body, green legs) -->
  <g transform="translate(150,350)" opacity="0.12">
    <rect x="-30" y="-70" width="60" height="60" rx="4" fill="#ffd700"/>
    <circle cx="-10" cy="-48" r="5" fill="#222"/>
    <circle cx="10" cy="-48" r="5" fill="#222"/>
    <path d="M-8,-35 Q0,-28 8,-35" stroke="#222" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <rect x="-28" y="-8" width="56" height="50" rx="3" fill="#00b4d8"/>
    <rect x="-40" y="-5" width="14" height="40" rx="3" fill="#ffd700"/>
    <rect x="26" y="-5" width="14" height="40" rx="3" fill="#ffd700"/>
    <rect x="-24" y="44" width="20" height="35" rx="3" fill="#6bcb77"/>
    <rect x="4" y="44" width="20" height="35" rx="3" fill="#6bcb77"/>
  </g>
  <!-- Character 2 -->
  <g transform="translate(650,200)" opacity="0.1">
    <rect x="-25" y="-60" width="50" height="50" rx="4" fill="#ffd700"/>
    <circle cx="-8" cy="-42" r="4" fill="#222"/>
    <circle cx="8" cy="-42" r="4" fill="#222"/>
    <path d="M-6,-30 Q0,-24 6,-30" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="-23" y="-8" width="46" height="42" rx="3" fill="#00b4d8"/>
    <rect x="-20" y="36" width="16" height="28" rx="3" fill="#6bcb77"/>
    <rect x="4" y="36" width="16" height="28" rx="3" fill="#6bcb77"/>
  </g>
  <!-- Floating Robux symbol -->
  <g transform="translate(400,180)" opacity="0.15">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00b4d8" stroke-width="4"/>
    <text x="0" y="8" text-anchor="middle" font-size="36" font-weight="bold" fill="#00b4d8" font-family="Arial">R</text>
  </g>
  <!-- Game controller -->
  <g transform="translate(600,500)" opacity="0.1">
    <rect x="-40" y="-15" width="80" height="30" rx="15" fill="#00b4d8"/>
    <circle cx="-18" cy="0" r="8" fill="#003a55"/>
    <circle cx="18" cy="0" r="4" fill="#003a55"/>
    <circle cx="26" cy="-8" r="4" fill="#003a55"/>
    <circle cx="26" cy="8" r="4" fill="#003a55"/>
    <circle cx="10" cy="0" r="4" fill="#003a55"/>
  </g>
  <!-- Sword -->
  <g transform="translate(100,650) rotate(-30)" opacity="0.12">
    <rect x="-3" y="-60" width="6" height="50" rx="2" fill="#b0b0b0"/>
    <rect x="-12" y="-12" width="24" height="6" rx="2" fill="#ffd700"/>
    <rect x="-4" y="-6" width="8" height="25" rx="2" fill="#8B4513"/>
    <polygon points="-3,-60 0,-68 3,-60" fill="#e0e0e0"/>
  </g>
  <!-- Diamond -->
  <g transform="translate(680,850)" opacity="0.15">
    <polygon points="0,-30 25,0 0,35 -25,0" fill="#00b4d8" opacity="0.6"/>
    <polygon points="0,-30 25,0 0,5" fill="#4dc9e6" opacity="0.8"/>
    <polygon points="0,-30 -25,0 0,5" fill="#0090b0" opacity="0.8"/>
  </g>
  <!-- Trophy -->
  <g transform="translate(350,600)" opacity="0.1">
    <rect x="-8" y="15" width="16" height="12" rx="2" fill="#ffd700"/>
    <rect x="-14" y="27" width="28" height="5" rx="2" fill="#ffd700"/>
    <path d="M-15,-15 Q-15,20 0,18 Q15,20 15,-15 Z" fill="#ffd700"/>
    <path d="M-15,-10 Q-28,-5 -20,10 Q-15,15 -12,10" fill="#ffd700" opacity="0.7"/>
    <path d="M15,-10 Q28,-5 20,10 Q15,15 12,10" fill="#ffd700" opacity="0.7"/>
  </g>
  <!-- Stars / sparkles -->
  <circle cx="100" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="300" cy="50" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="500" cy="90" r="2" fill="white" opacity="0.8"/>
  <circle cx="700" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="150" r="1" fill="white" opacity="0.4"/>
  <circle cx="550" cy="300" r="2" fill="white" opacity="0.7"/>
  <circle cx="50" cy="400" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="750" cy="400" r="2" fill="white" opacity="0.6"/>
  <circle cx="300" cy="500" r="1" fill="white" opacity="0.8"/>
  <circle cx="450" cy="750" r="2" fill="white" opacity="0.5"/>
  <circle cx="150" cy="900" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="600" cy="950" r="2" fill="white" opacity="0.6"/>
  <circle cx="350" cy="1100" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="700" cy="1100" r="1" fill="white" opacity="0.8"/>
  <!-- Blocky grid pattern -->
  <g opacity="0.04" fill="#00b4d8">
    <rect x="0" y="0" width="40" height="40"/>
    <rect x="80" y="0" width="40" height="40"/>
    <rect x="160" y="0" width="40" height="40"/>
    <rect x="40" y="40" width="40" height="40"/>
    <rect x="120" y="40" width="40" height="40"/>
    <rect x="0" y="80" width="40" height="40"/>
    <rect x="80" y="80" width="40" height="40"/>
    <rect x="160" y="80" width="40" height="40"/>
    <rect x="640" y="800" width="40" height="40"/>
    <rect x="720" y="800" width="40" height="40"/>
    <rect x="680" y="840" width="40" height="40"/>
    <rect x="760" y="840" width="40" height="40"/>
    <rect x="640" y="880" width="40" height="40"/>
    <rect x="720" y="880" width="40" height="40"/>
  </g>
</svg>