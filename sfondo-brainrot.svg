<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#332500"/>
      <stop offset="50%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#0d0900"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd93d" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffd93d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4a261" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f4a261" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1200" fill="url(#bg)"/>
  <circle cx="200" cy="250" r="220" fill="url(#glow1)"/>
  <circle cx="600" cy="700" r="250" fill="url(#glow2)"/>
  <circle cx="400" cy="1000" r="200" fill="url(#glow1)"/>
  <!-- Tung Tung Sahur (log character with bat) -->
  <g transform="translate(180,320)" opacity="0.13">
    <rect x="-20" y="-55" width="40" height="65" rx="8" fill="#8B6914"/>
    <circle cx="-8" cy="-35" r="5" fill="#222"/>
    <circle cx="10" cy="-35" r="5" fill="#222"/>
    <path d="M-6,-22 Q0,-16 6,-22" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="-12" y="12" width="10" height="35" rx="3" fill="#7a5c10"/>
    <rect x="2" y="12" width="10" height="35" rx="3" fill="#7a5c10"/>
    <rect x="-35" y="-10" width="8" height="30" rx="3" fill="#7a5c10" transform="rotate(-15,-35,-10)"/>
    <rect x="27" y="-15" width="8" height="40" rx="3" fill="#8B6914" transform="rotate(20,27,-15)"/>
  </g>
  <!-- Bombardiro Crocodilo -->
  <g transform="translate(620,220)" opacity="0.11">
    <ellipse cx="0" cy="0" rx="35" ry="20" fill="#4a7a2e"/>
    <ellipse cx="30" cy="-5" rx="20" ry="12" fill="#4a7a2e"/>
    <rect x="38" y="-12" width="18" height="6" rx="2" fill="#3a6a1e"/>
    <circle cx="38" cy="-10" r="4" fill="#ffd93d"/>
    <circle cx="38" cy="-10" r="2" fill="#222"/>
    <rect x="-30" y="10" width="8" height="15" rx="2" fill="#3a6a1e"/>
    <rect x="-10" y="10" width="8" height="15" rx="2" fill="#3a6a1e"/>
    <rect x="10" y="10" width="8" height="15" rx="2" fill="#3a6a1e"/>
    <rect x="25" y="10" width="8" height="15" rx="2" fill="#3a6a1e"/>
    <!-- Wings/propeller -->
    <ellipse cx="-15" cy="-18" rx="25" ry="5" fill="#888" opacity="0.5" transform="rotate(-10,-15,-18)"/>
    <ellipse cx="15" cy="-18" rx="25" ry="5" fill="#888" opacity="0.5" transform="rotate(10,15,-18)"/>
  </g>
  <!-- Cappuccino Assassino (coffee cup with knife) -->
  <g transform="translate(450,500)" opacity="0.12">
    <rect x="-18" y="-25" width="36" height="40" rx="6" fill="#8B6914"/>
    <rect x="-20" y="-28" width="40" height="8" rx="4" fill="#a07818"/>
    <ellipse cx="0" cy="-28" rx="18" ry="5" fill="#d4a030" opacity="0.5"/>
    <path d="M18,-15 Q30,-10 25,5 Q20,15 18,10" stroke="#8B6914" stroke-width="4" fill="none"/>
    <circle cx="-5" cy="-12" r="3" fill="#222"/>
    <circle cx="7" cy="-12" r="3" fill="#222"/>
    <path d="M-4,-4 Q0,0 4,-4" stroke="#222" stroke-width="1.5" fill="none"/>
    <!-- Knife -->
    <rect x="22" y="-30" width="3" height="20" rx="1" fill="#bbb"/>
    <rect x="21" y="-10" width="5" height="8" rx="1" fill="#654321"/>
    <polygon points="22,-30 23.5,-38 25,-30" fill="#ddd"/>
  </g>
  <!-- Bombombini Gusini (goose with bomb) -->
  <g transform="translate(150,700)" opacity="0.1">
    <ellipse cx="0" cy="0" rx="22" ry="28" fill="white"/>
    <circle cx="0" cy="-30" r="14" fill="white"/>
    <polygon points="-2,-28 -12,-25 -2,-22" fill="#f4a261"/>
    <circle cx="4" cy="-33" r="2.5" fill="#222"/>
    <!-- Bomb -->
    <circle cx="25" cy="-5" r="12" fill="#333"/>
    <rect x="23" y="-20" width="4" height="8" rx="2" fill="#666"/>
    <path d="M25,-20 Q30,-28 35,-25" stroke="#f4a261" stroke-width="2" fill="none"/>
    <circle cx="36" cy="-26" r="4" fill="#ff6b6b" opacity="0.8"/>
  </g>
  <!-- La Vaca Saturno -->
  <g transform="translate(650,600)" opacity="0.1">
    <ellipse cx="0" cy="0" rx="30" ry="22" fill="white"/>
    <circle cx="-8" cy="0" r="10" fill="#333" opacity="0.3"/>
    <circle cx="12" cy="-5" r="8" fill="#333" opacity="0.3"/>
    <circle cx="0" cy="-28" r="15" fill="white"/>
    <circle cx="-5" cy="-32" r="2.5" fill="#222"/>
    <circle cx="7" cy="-32" r="2.5" fill="#222"/>
    <ellipse cx="0" cy="-24" rx="6" ry="4" fill="#ffb7dd"/>
    <!-- Saturn ring -->
    <ellipse cx="0" cy="-28" rx="28" ry="6" fill="none" stroke="#ffd93d" stroke-width="2.5" opacity="0.6" transform="rotate(-15,0,-28)"/>
    <rect x="-5" y="-45" width="4" height="8" rx="2" fill="white"/>
    <rect x="3" y="-46" width="4" height="9" rx="2" fill="white"/>
  </g>
  <!-- Explosion effects -->
  <g transform="translate(400,150)" opacity="0.1">
    <polygon points="0,-35 8,-12 30,-15 14,2 22,25 0,12 -22,25 -14,2 -30,-15 -8,-12" fill="#ffd93d"/>
  </g>
  <g transform="translate(100,900)" opacity="0.08">
    <polygon points="0,-25 6,-8 22,-10 10,2 16,18 0,9 -16,18 -10,2 -22,-10 -6,-8" fill="#f4a261"/>
  </g>
  <!-- Pizza -->
  <g transform="translate(350,850)" opacity="0.1">
    <path d="M0,-30 L22,20 L-22,20 Z" fill="#ffd93d"/>
    <path d="M0,-25 L18,16 L-18,16 Z" fill="#f4a261" opacity="0.5"/>
    <circle cx="-5" cy="0" r="4" fill="#c9184a" opacity="0.6"/>
    <circle cx="8" cy="5" r="3.5" fill="#c9184a" opacity="0.6"/>
    <circle cx="0" cy="12" r="3" fill="#c9184a" opacity="0.6"/>
  </g>
  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="#ffd93d" opacity="0.7"/>
  <circle cx="300" cy="50" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="500" cy="90" r="2" fill="#ffd93d" opacity="0.8"/>
  <circle cx="700" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="150" r="1" fill="#ffd93d" opacity="0.4"/>
  <circle cx="550" cy="300" r="2" fill="white" opacity="0.7"/>
  <circle cx="50" cy="400" r="1.5" fill="#ffd93d" opacity="0.5"/>
  <circle cx="750" cy="400" r="2" fill="white" opacity="0.6"/>
  <circle cx="300" cy="500" r="1" fill="#ffd93d" opacity="0.8"/>
  <circle cx="450" cy="750" r="2" fill="white" opacity="0.5"/>
  <circle cx="150" cy="950" r="1.5" fill="#ffd93d" opacity="0.7"/>
  <circle cx="600" cy="1000" r="2" fill="white" opacity="0.6"/>
  <circle cx="350" cy="1100" r="1.5" fill="#ffd93d" opacity="0.5"/>
  <circle cx="700" cy="1100" r="1" fill="white" opacity="0.8"/>
  <!-- Sparkle crosses -->
  <g transform="translate(300,400)" opacity="0.6" fill="#ffd93d">
    <rect x="-1" y="-10" width="2" height="20" rx="1"/>
    <rect x="-10" y="-1" width="20" height="2" rx="1"/>
    <rect x="-0.7" y="-7" width="1.4" height="14" rx="1" transform="rotate(45)"/>
    <rect x="-7" y="-0.7" width="14" height="1.4" rx="1" transform="rotate(45)"/>
  </g>
  <g transform="translate(700,450)" opacity="0.5" fill="#f4a261">
    <rect x="-0.8" y="-8" width="1.6" height="16" rx="1"/>
    <rect x="-8" y="-0.8" width="16" height="1.6" rx="1"/>
    <rect x="-0.5" y="-5" width="1" height="10" rx="1" transform="rotate(45)"/>
    <rect x="-5" y="-0.5" width="10" height="1" rx="1" transform="rotate(45)"/>
  </g>
</svg>