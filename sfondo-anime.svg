    <rect x="-6" y="-0.5" width="12" height="1" rx="1" transform="rotate(45)"/>
  </g>
  <g transform="translate(650,350)" opacity="0.8" fill="#ffd700">
    <rect x="-1" y="-10" width="2" height="20" rx="1"/>
    <rect x="-10" y="-1" width="20" height="2" rx="1"/>
    <rect x="-0.7" y="-7" width="1.4" height="14" rx="1" transform="rotate(45)"/>
    <rect x="-7" y="-0.7" width="14" height="1.4" rx="1" transform="rotate(45)"/>
  </g>
  <g transform="translate(300,700)" opacity="0.6" fill="#c77dff">
    <rect x="-0.8" y="-8" width="1.6" height="16" rx="1"/>
    <rect x="-8" y="-0.8" width="16" height="1.6" rx="1"/>
    <rect x="-0.5" y="-5" width="1" height="10" rx="1" transform="rotate(45)"/>
    <rect x="-5" y="-0.5" width="10" height="1" rx="1" transform="rotate(45)"/>
  </g>
  <g transform="translate(580,550)" opacity="0.7" fill="#ff85cb">
    <rect x="-1" y="-11" width="2" height="22" rx="1"/>
    <rect x="-11" y="-1" width="22" height="2" rx="1"/>
    <rect x="-0.7" y="-7" width="1.4" height="14" rx="1" transform="rotate(45)"/>
    <rect x="-7" y="-0.7" width="14" height="1.4" rx="1" transform="rotate(45)"/>
  </g>
  <!-- Crescent moon -->
  <g transform="translate(620,120)">
    <circle cx="0" cy="0" r="35" fill="#ffd700" opacity="0.15"/>
    <circle cx="0" cy="0" r="25" fill="#ffd700" opacity="0.9"/>
    <circle cx="10" cy="-5" r="22" fill="#1a0a3e"/>
  </g>
  <!-- Sakura petals -->
  <g opacity="0.5">
    <ellipse cx="120" cy="550" rx="6" ry="10" fill="#ff85cb" transform="rotate(30,120,550)"/>
    <ellipse cx="500" cy="450" rx="5" ry="8" fill="#ffb7dd" transform="rotate(-20,500,450)"/>
    <ellipse cx="680" cy="600" rx="6" ry="9" fill="#ff85cb" transform="rotate(60,680,600)"/>
    <ellipse cx="250" cy="850" rx="5" ry="8" fill="#ffb7dd" transform="rotate(-40,250,850)"/>
    <ellipse cx="550" cy="900" rx="6" ry="10" fill="#ff85cb" transform="rotate(15,550,900)"/>
    <ellipse cx="80" cy="950" rx="4" ry="7" fill="#ffb7dd" transform="rotate(50,80,950)"/>
    <ellipse cx="720" cy="1050" rx="5" ry="9" fill="#ff85cb" transform="rotate(-30,720,1050)"/>
