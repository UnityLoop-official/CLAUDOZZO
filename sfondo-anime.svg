<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="50%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#0a0020"/>
    </radialGradient>
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c77dff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c77dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6bcb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6bcb" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1200" fill="url(#bg)"/>
  <!-- Big glows -->
  <circle cx="200" cy="300" r="200" fill="url(#glow1)"/>
  <circle cx="650" cy="800" r="250" fill="url(#glow2)"/>
  <circle cx="400" cy="150" r="150" fill="url(#glow1)"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="white" opacity="0.9"/>
  <circle cx="250" cy="50" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="400" cy="30" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="550" cy="70" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="700" cy="40" r="2" fill="white" opacity="0.9"/>
  <circle cx="80" cy="200" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="300" cy="180" r="2" fill="white" opacity="0.8"/>
  <circle cx="500" cy="160" r="1" fill="white" opacity="0.7"/>
  <circle cx="720" cy="200" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="150" cy="350" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="450" cy="320" r="2" fill="white" opacity="0.5"/>
  <circle cx="600" cy="380" r="1" fill="white" opacity="0.8"/>
  <circle cx="50" cy="500" r="2" fill="white" opacity="0.7"/>
  <circle cx="350" cy="480" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="750" cy="520" r="2" fill="white" opacity="0.9"/>
  <circle cx="200" cy="600" r="1" fill="white" opacity="0.5"/>
  <circle cx="500" cy="650" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="100" cy="750" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="650" cy="700" r="2" fill="white" opacity="0.6"/>
  <circle cx="400" cy="850" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="300" cy="950" r="2" fill="white" opacity="0.5"/>
  <circle cx="700" cy="900" r="1" fill="white" opacity="0.8"/>
  <circle cx="550" cy="1050" r="2" fill="white" opacity="0.7"/>
  <circle cx="150" cy="1100" r="1.5" fill="white" opacity="0.6"/>
  <!-- Sparkle crosses -->
  <g transform="translate(400,250)" opacity="0.9" fill="#c77dff">
    <rect x="-1" y="-12" width="2" height="24" rx="1"/>
