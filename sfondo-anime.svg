    <rect x="-0.7" y="-8" width="1.4" height="16" rx="1" transform="rotate(45)"/>
    <rect x="-8" y="-0.7" width="16" height="1.4" rx="1" transform="rotate(45)"/>
  </g>
  <g transform="translate(150,450)" opacity="0.7" fill="#ff85cb">
