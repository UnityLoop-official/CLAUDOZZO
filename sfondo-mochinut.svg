<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#5a0028"/>
      <stop offset="50%" stop-color="#2e0013"/>
      <stop offset="100%" stop-color="#1a000a"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff85a1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff85a1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb7dd" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffb7dd" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1200" fill="url(#bg)"/>
  <circle cx="200" cy="250" r="220" fill="url(#glow1)"/>
  <circle cx="600" cy="700" r="250" fill="url(#glow2)"/>
  <circle cx="400" cy="1000" r="200" fill="url(#glow1)"/>
  <!-- Donut 1 -->
  <g transform="translate(180,300)" opacity="0.13">
    <circle cx="0" cy="0" r="50" fill="#ff85a1"/>
    <circle cx="0" cy="0" r="20" fill="#2e0013"/>
    <circle cx="-15" cy="-20" r="3" fill="#ffd700"/>
    <circle cx="10" cy="-22" r="2.5" fill="#00b4d8"/>
    <circle cx="20" cy="-10" r="3" fill="#6bcb77"/>
    <circle cx="-22" cy="5" r="2.5" fill="#ffd700"/>
    <circle cx="5" cy="25" r="3" fill="#c77dff"/>
    <circle cx="-10" cy="22" r="2" fill="#ff6b6b"/>
    <circle cx="22" cy="10" r="2.5" fill="#00b4d8"/>
  </g>
  <!-- Donut 2 -->
  <g transform="translate(620,180)" opacity="0.1">
    <circle cx="0" cy="0" r="40" fill="#ffb7dd"/>
    <circle cx="0" cy="0" r="16" fill="#2e0013"/>
    <circle cx="-12" cy="-16" r="2.5" fill="#ffd700"/>
    <circle cx="8" cy="-18" r="2" fill="#6bcb77"/>
    <circle cx="18" cy="-5" r="2.5" fill="#00b4d8"/>
    <circle cx="-18" cy="5" r="2" fill="#c77dff"/>
    <circle cx="5" cy="18" r="2.5" fill="#ff6b6b"/>
  </g>
  <!-- Bubble Tea -->
  <g transform="translate(500,450)" opacity="0.12">
    <rect x="-22" y="-50" width="44" height="75" rx="10" fill="#ffb7dd" opacity="0.7"/>
    <rect x="-18" y="-45" width="36" height="30" rx="6" fill="#ff85a1" opacity="0.5"/>
    <circle cx="-5" cy="0" r="6" fill="#5a0028" opacity="0.6"/>
    <circle cx="8" cy="5" r="5" fill="#5a0028" opacity="0.6"/>
    <circle cx="-8" cy="12" r="5.5" fill="#5a0028" opacity="0.6"/>
    <circle cx="5" cy="15" r="6" fill="#5a0028" opacity="0.6"/>
    <rect x="-25" y="-55" width="50" height="10" rx="5" fill="#ff85a1"/>
    <rect x="-2" y="-80" width="4" height="30" rx="2" fill="#ff85a1"/>
  </g>
  <!-- Mochi -->
  <g transform="translate(120,650)" opacity="0.1">
    <ellipse cx="0" cy="0" rx="30" ry="22" fill="#ffb7dd"/>
    <ellipse cx="0" cy="-5" rx="25" ry="15" fill="#ffd6eb" opacity="0.5"/>
    <circle cx="-8" cy="-2" r="2" fill="#5a0028" opacity="0.4"/>
    <circle cx="8" cy="-2" r="2" fill="#5a0028" opacity="0.4"/>
    <path d="M-4,4 Q0,8 4,4" stroke="#5a0028" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>
  <!-- Unicorn horn -->
  <g transform="translate(650,550)" opacity="0.12">
    <polygon points="0,-50 12,0 -12,0" fill="#ffd700"/>
    <line x1="-6" y1="-15" x2="6" y2="-20" stroke="#ff85a1" stroke-width="2"/>
    <line x1="-8" y1="-5" x2="4" y2="-10" stroke="#c77dff" stroke-width="2"/>
    <line x1="-4" y1="-30" x2="8" y2="-35" stroke="#00b4d8" stroke-width="2"/>
    <circle cx="0" cy="8" r="20" fill="#ffb7dd" opacity="0.5"/>
  </g>
  <!-- Heart -->
  <g transform="translate(350,200)" opacity="0.12">
    <path d="M0,15 C-5,10 -20,-5 -12,-15 C-5,-25 0,-15 0,-10 C0,-15 5,-25 12,-15 C20,-5 5,10 0,15Z" fill="#ff85a1" transform="scale(2)"/>
  </g>
  <!-- Bow -->
  <g transform="translate(700,850)" opacity="0.1">
    <ellipse cx="-18" cy="0" rx="18" ry="12" fill="#ff85a1"/>
    <ellipse cx="18" cy="0" rx="18" ry="12" fill="#ff85a1"/>
    <circle cx="0" cy="0" r="6" fill="#ffb7dd"/>
  </g>
  <!-- Cake -->
  <g transform="translate(300,850)" opacity="0.1">
    <rect x="-25" y="-10" width="50" height="30" rx="4" fill="#ffb7dd"/>
    <rect x="-28" y="-15" width="56" height="10" rx="5" fill="#ff85a1"/>
    <rect x="-2" y="-30" width="4" height="18" rx="2" fill="#ffd700"/>
    <circle cx="0" cy="-33" r="4" fill="#ff6b6b"/>
  </g>
  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="300" cy="50" r="1.5" fill="#ffb7dd" opacity="0.5"/>
  <circle cx="500" cy="90" r="2" fill="white" opacity="0.8"/>
  <circle cx="700" cy="60" r="1.5" fill="#ffb7dd" opacity="0.6"/>
  <circle cx="200" cy="150" r="1" fill="white" opacity="0.4"/>
  <circle cx="550" cy="300" r="2" fill="#ffb7dd" opacity="0.7"/>
  <circle cx="50" cy="400" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="750" cy="400" r="2" fill="#ffb7dd" opacity="0.6"/>
  <circle cx="300" cy="500" r="1" fill="white" opacity="0.8"/>
  <circle cx="450" cy="750" r="2" fill="#ffb7dd" opacity="0.5"/>
  <circle cx="150" cy="900" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="600" cy="950" r="2" fill="#ffb7dd" opacity="0.6"/>
  <circle cx="350" cy="1100" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="700" cy="1100" r="1" fill="#ffb7dd" opacity="0.8"/>
  <!-- Sparkle crosses -->
  <g transform="translate(420,350)" opacity="0.7" fill="#ff85a1">
    <rect x="-1" y="-10" width="2" height="20" rx="1"/>
    <rect x="-10" y="-1" width="20" height="2" rx="1"/>
    <rect x="-0.7" y="-7" width="1.4" height="14" rx="1" transform="rotate(45)"/>
    <rect x="-7" y="-0.7" width="14" height="1.4" rx="1" transform="rotate(45)"/>
  </g>
  <g transform="translate(100,450)" opacity="0.5" fill="#ffb7dd">
    <rect x="-0.8" y="-8" width="1.6" height="16" rx="1"/>
    <rect x="-8" y="-0.8" width="16" height="1.6" rx="1"/>
    <rect x="-0.5" y="-5" width="1" height="10" rx="1" transform="rotate(45)"/>
    <rect x="-5" y="-0.5" width="10" height="1" rx="1" transform="rotate(45)"/>
  </g>
  <g transform="translate(720,650)" opacity="0.6" fill="#ff85a1">
    <rect x="-1" y="-9" width="2" height="18" rx="1"/>
    <rect x="-9" y="-1" width="18" height="2" rx="1"/>
    <rect x="-0.7" y="-6" width="1.4" height="12" rx="1" transform="rotate(45)"/>
    <rect x="-6" y="-0.7" width="12" height="1.4" rx="1" transform="rotate(45)"/>
  </g>
</svg>